id: beamod_lms_beamformer
label: LMS Beamformer
category: '[beamod]'

templates:
  imports: from gnuradio import beamod
  make: beamod.lms_beamformer(${num_antennas}, ${mu})

parameters:
- id: num_antennas
  label: Number of Antennas
  dtype: int
  default: 2

- id: mu
  label: LMS Step Size (mu)
  dtype: float
  default: 0.001

inputs:
- label: antenna_vector
  domain: stream
  dtype: complex
  vlen: ${num_antennas}

- label: reference
  domain: stream
  dtype: complex

outputs:
- label: out
  domain: stream
  dtype: complex

file_format: 1

